################################################################################
# HA KioskOS — Build konfigurace
# Edituj tyto hodnoty před buildem
################################################################################

# Verze RPi OS Lite 64-bit (Bookworm) ke stažení
# Aktuální verze: https://www.raspberrypi.com/software/operating-systems/
RPI_OS_URL="https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2024-11-19/2024-11-19-raspios-bookworm-arm64-lite.img.xz"

# SHA256 checksum pro ověření stažení
# Najdeš na: https://www.raspberrypi.com/software/operating-systems/ (klikni na SHA256)
# Formát: sha256:HEXSTRING  nebo jen HEXSTRING
# Nech prázdné nebo "sha256:skip" pro přeskočení verifikace (nedoporučeno)
RPI_OS_SHA256="sha256:6ac3a10a1f144c7e9d1f8e568d75ca809288280a593eb6ca053e49b539f465a4"

# Název výsledného image souboru
IMAGE_NAME="ha-kiosk-os"

# Verze image (přidá se do /etc/ha-kiosk-os_version)
IMAGE_VERSION="1.0.0"

# Moduly k zahrnutí (pořadí = pořadí instalace)
# Zakomentuj (#) modul který nechceš zahrnout
MODULES=(
    "01-kiosk-base"
    "02-vnc"
    "03-claude-code"
    "04-audio"
    "05-ha-bootstrap"
    "06-monitoring"
)

# Výstupní adresář pro image
OUTPUT_DIR="src/image"

# Pracovní adresář pro build (bude smazán po buildu)
WORKSPACE_DIR="workspace"

# Zachovat workspace pro debug (true/false)
KEEP_WORKSPACE="false"

# Extra místo přidané do image pro instalaci balíčků (v GB)
# RPi OS Lite je ~4 GB, naše moduly přidají dalších 2–3 GB
EXTRA_SIZE_GB="4"

# Komprimovat výsledný image pomocí xz? (true/false)
# true = menší soubor (~1.5 GB), ale trvá déle; false = rychleji, ~6 GB .img
COMPRESS_IMAGE="false"
