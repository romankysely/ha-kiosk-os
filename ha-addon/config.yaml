name: "HA KioskOS — Kiosk Builder"
version: "1.0.0"
slug: "ha_kiosk_os"
description: "Správa HA kiosků — generování kiosk.conf, registrace RPi, status"
url: "https://github.com/romankysely/ha-kiosk-os"
arch:
  - aarch64
  - amd64
  - armv7
init: false

# Přístup k HA Supervisor API (pro hostname, systémové info)
hassio_api: true
hassio_role: default

# Webové UI přes HA ingress
ingress: true
ingress_port: 8099
panel_icon: mdi:monitor-multiple
panel_title: Kiosk Builder

# Port pro přímé API volání z RPi (phone-home)
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Kiosk Builder API + Web UI"

# Persistent storage pro kiosky a SSH klíče
map:
  - data

# Konfigurace addonu
options:
  admin_password: "kiosk"
  ssh_key_bits: 4096
  kiosk_download_url: ""

schema:
  admin_password: str
  ssh_key_bits: int
  kiosk_download_url: str
