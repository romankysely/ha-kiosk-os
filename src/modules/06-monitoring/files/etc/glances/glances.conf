# HA KioskOS — Glances konfigurace
# Soubor: /etc/glances/glances.conf

[global]
# Interval obnovy (sekundy)
refresh=3

[outputs]
# Webový server — dostupný z LAN bez hesla
# Přístup: http://kiosk.local:61208
browser=False

[quicklook]
# Zobrazit CPU, RAM, SWAP, diskové I/O
cpu=True
mem=True
swap=True
load=True

[cpu]
user_careful=50
user_warning=70
user_critical=90

[mem]
careful=50
warning=70
critical=90

[memswap]
careful=50
warning=70
critical=90

[disk]
# Sledovat kořenový oddíl
[/]
careful=80
warning=90
critical=95

[temperature]
# Pi5 CPU teplota
careful=60
warning=70
critical=80

[network]
# Sledovat ethernet i wifi
hide=lo

[processlist]
# Zobrazit top 10 procesů
max_processes=10

[amp_chromium]
# Alert když Chromium spotřebuje více než 80% CPU po dobu 30s
enable=True
regex=chromium
refresh=30
command=systemctl restart kiosk-watchdog
countmin=1
