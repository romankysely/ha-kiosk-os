[main]
# Automaticky se schová/zobrazí podle focusu textového pole
auto-show-enabled=true
auto-hide-enabled=true
auto-hide-delay=3.0

# Pozice — spodní část obrazovky
start-minimized=true

# Téma vhodné pro kiosk
theme=Nightshade

# Rozložení — kompaktní pro kiosk
layout=Phone

# Průhlednost (0.0 = průhledná, 1.0 = neprůhledná)
transparency=0.1
background-transparency=10

# Bez dekorace okna
window-decoration=false

# Vždy navrchu ostatních oken
always-on-top=true

[window]
# Výška klávesnice (px) — přizpůsob podle displeje
height=250

[accessibility]
# Podpora pro at-spi2 (automatické zobrazení při textovém focusu)
enable-dwell-activation=false
